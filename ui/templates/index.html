<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深海科技文献知识问答系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>深海科技文献知识问答系统</h1>
            <p>基于RAG技术的智能问答助手</p>
        </header>
        
        <div class="tabs">
            <button class="tab-button active" data-tab="single">单个问题</button>
            <button class="tab-button" data-tab="batch">批量问题</button>
            <button class="tab-button" data-tab="history">历史记录</button>
        </div>
        
        <div class="tab-content" id="single">
            <div class="input-section">
                <div class="model-selector">
                    <label for="llm_provider">模型提供商：</label>
                    <select id="llm_provider">
                        <option value="zhipu">智谱</option>
                        <option value="dashscope">阿里</option>
                        <option value="openai">OpenAI</option>
                    </select>
                    <label for="llm_model">模型：</label>
                    <select id="llm_model">
                        <option value="glm-4-plus">glm-4-plus</option>
                        <option value="qwen-plus">qwen-plus</option>
                        <option value="gpt-4o">gpt-4o</option>
                    </select>
                </div>
                <textarea id="query" placeholder="请输入您的问题..."></textarea>
                <button id="submit-query" class="btn-primary">提交</button>
            </div>
            
            <div class="status-section">
                <div id="status" class="hidden">
                    <h3>正在处理...</h3>
                    <div class="thinking-process">
                        <h4>思考过程</h4>
                        <div id="process-steps"></div>
                    </div>
                </div>
            </div>
            
            <div class="result-section">
                <h3>回答结果</h3>
                <div id="answer"></div>
                <div class="references">
                    <h4>参考文献</h4>
                    <div id="refs-list"></div>
                </div>
            </div>
        </div>
        
        <div class="tab-content hidden" id="batch">
            <div class="batch-container">
                <div class="batch-left-section">
                    <div class="batch-input-section">
                        <h3>批量问题上传</h3>
                        <div class="input-section">
                            <div class="model-selector">
                                <label for="batch-llm_provider">模型提供商：</label>
                                <select id="batch-llm_provider">
                                    <option value="zhipu">智谱</option>
                                    <option value="dashscope">阿里</option>
                                    <option value="openai">OpenAI</option>
                                </select>
                                <label for="batch-llm_model">模型：</label>
                                <select id="batch-llm_model">
                                    <option value="glm-4-plus">glm-4-plus</option>
                                    <option value="qwen-plus">qwen-plus</option>
                                    <option value="gpt-4o">gpt-4o</option>
                                </select>
                            </div>
                            <div class="file-upload">
                                <input type="file" id="batch-file" accept=".txt">
                                <button id="submit-batch" class="btn-primary">上传并处理</button>
                            </div>
                            <div id="batch-preview" class="hidden">
                                <h4>问题预览</h4>
                                <div id="questions-list"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="batch-results">
                        <h3>批量处理结果</h3>
                        <div id="batch-results-container"></div>
                    </div>
                </div>
                <div class="batch-right-section">
                    <div class="info-card">
                        <h4>文件格式说明</h4>
                        <ul>
                            <li>支持的文件格式：<strong>.txt</strong></li>
                            <li>文件编码：UTF-8</li>
                            <li>格式要求：</li>
                            <ul style="margin-left: 20px;">
                                <li>每行一个问题</li>
                                <li>问题不能为空</li>
                                <li>建议每个问题不超过200字</li>
                                <li>示例格式：</li>
                            </ul>
                            <div style="font-family: monospace; background: #f5f5f5; padding: 10px; margin-top: 10px; margin-left: 20px; border-radius: 4px;">
                                AUV的定义是什么？<br>
                                水下机器人的应用领域有哪些？<br>
                                深海探索的挑战是什么？
                            </div>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="tab-content hidden" id="history">
            <div class="history-section">
                <h3>历史记录</h3>
                <div id="history-list"></div>
                <button id="clear-history" class="btn-primary">清空历史</button>
            </div>
        </div>
    </div>
    
    <script src="/static/js/script.js"></script>
</body>
</html>
